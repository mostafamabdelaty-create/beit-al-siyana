<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - صلحلي</title>
  
  <!-- Google Fonts: Cairo -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    body.login-page {
      background-color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .login-card {
      background: white;
      max-width: 450px;
      width: 100%;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header img {
      width: 150px;
      margin-bottom: 20px;
      filter: invert(1);
    }
    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #0b2239;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #334155;
    }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      outline: none;
    }
    .login-btn {
      width: 100%;
      background: var(--primary-color, #3b82f6);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .login-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(37, 99, 235, 0.2);
    }
    .login-footer {
      text-align: center;
      margin-top: 25px;
      color: #64748b;
      font-size: 0.95rem;
    }
    .login-footer a {
      color: #3b82f6;
      font-weight: 700;
      text-decoration: none;
    }
    .login-footer a:hover {
      text-decoration: underline;
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }
    .back-home:hover {
      color: #334155;
    }
  </style>
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card" data-aos="fade-up">
      <div class="login-header">
        <a href="index.html"><img src="Images/logo.svg" alt="صلحلي"></a>
        <h1>تسجيل الدخول</h1>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" required placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        
        <div id="loginStatus" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.9rem;"></div>
        
        <button type="submit" class="login-btn">دخول</button>
      </form>
      
      <div class="login-footer">
        ليس لديك حساب؟ <a href="join-technician.html">انضم كفني الآن</a>
      </div>
      
      <a href="index.html" class="back-home"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>
  </div>

  <script src="js/script.js"></script>
 <script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const statusDiv = document.getElementById('loginStatus');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    statusDiv.style.display = 'block';
    statusDiv.style.backgroundColor = '#eff6ff';
    statusDiv.style.color = '#1d4ed8';
    statusDiv.innerText = 'جاري التحقق...';

    try {
      const response = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const text = await response.text();
      let result = {};

      try {
        result = JSON.parse(text);
      } catch {
        result = { message: text };
      }

      if (response.ok) {
        statusDiv.style.backgroundColor = '#d1fae5';
        statusDiv.style.color = '#065f46';
        statusDiv.innerText = 'تم تسجيل الدخول بنجاح! جاري التحويل...';

        if (result.token) {
          localStorage.setItem('token', result.token);
        }

        setTimeout(() => {
          window.location.href = 'admin-dashboard.html';
        }, 1500);
      } else {
        statusDiv.style.backgroundColor = '#fee2e2';
        statusDiv.style.color = '#991b1b';
        statusDiv.innerText = result.message || 'فشل تسجيل الدخول.';
        console.error('Login failed:', result);
      }
    } catch (error) {
      statusDiv.style.backgroundColor = '#fee2e2';
      statusDiv.style.color = '#991b1b';
      statusDiv.innerText = 'فشل الاتصال بالخادم.';
      console.error('Network / Server Error:', error);
    }
  });
</script>
</body>
</html>
